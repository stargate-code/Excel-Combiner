name: Build & Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build macOS app
        run: |
          pyinstaller --windowed --collect-all tkinterdnd2 --name "CSV Combiner" main.py
          cd dist
          zip -r "CSV-Combiner-macOS.zip" "CSV Combiner.app"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: CSV-Combiner-macOS
          path: dist/CSV-Combiner-macOS.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build Windows exe
        run: pyinstaller --onefile --windowed --collect-all tkinterdnd2 --name "CSV Combiner" main.py

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: CSV-Combiner-Windows
          path: dist/CSV Combiner.exe

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: CSV-Combiner-macOS

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: CSV-Combiner-Windows

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            CSV-Combiner-macOS.zip
            CSV Combiner.exe
          generate_release_notes: true
